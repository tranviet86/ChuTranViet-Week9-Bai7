name: Code Review Bot

on:
  pull_request:
    branches: [ main ]

jobs:
  checkstyle-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Quyền cực kỳ quan trọng để Bot viết comment
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Checkstyle Review
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          level: warning # Bot sẽ báo cảnh báo nếu code xấu